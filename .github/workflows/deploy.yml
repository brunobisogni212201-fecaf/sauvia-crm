name: Deploy to AWS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/ecr-login@v2
      
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/sauvia-app:$IMAGE_TAG .
          docker push $ECR_REGISTRY/sauvia-app:$IMAGE_TAG
          echo "::set-output name=image::$ECR_REGISTRY/sauvia-app:$IMAGE_TAG"
      
      - name: Deploy to EC2 via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          IMAGE: ${{ steps.login-ecr.outputs.registry }}/sauvia-app:${{ github.sha }}
        run: |
          aws ssm send-command \
            --instance-ids $INSTANCE_ID \
            --document-name AWS-RunRemoteScript \
            --parameters '{"commandString": "cd /opt/sauvia && docker-compose pull && docker-compose up -d --build app"}' \
            --region ${{ secrets.AWS_REGION }}