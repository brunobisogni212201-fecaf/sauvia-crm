version: '3.8'

services:
  # Traefik - Reverse Proxy & SSL
  traefik:
    image: traefik:v3.0
    container_name: sau via-traefik
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/traefik.yml:ro
      - ./docker/traefik/certs:/certs:rw
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - sau via-network
    labels:
      - "traefik.enable=true"

  # n8n - Automação
  n8n:
    image: n8nio/n8n:latest
    container_name: sau via-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_HOST=${N8N_HOST:-dev.sauvia.com.br}
      - WEBHOOK_URL=${WEBHOOK_URL:-https://dev.sauvia.com.br}
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - N8N_PROTOCOL=https
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - sau via-network
    depends_on:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.dev.sauvia.com.br`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls=true"
      - "traefik.http.services.n8n.loadbalancer.server.port=5678"

  # Evolute API - WhatsApp
  evolute-api:
    image: evolute evolution:latest
    container_name: sau via-evolute
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - EVOLUTE_API_KEY=${EVOLUTE_API_KEY}
      - EVOLUTE_INSTANCE=${EVOLUTE_INSTANCE}
      - EVOLUTE_SESSION=Evolution
    volumes:
      - evolute_data:/evolution/instances
    networks:
      - sau via-network

networks:
  sau via-network:
    driver: bridge

volumes:
  n8n_data:
  evolute_data: